<style>
:root{--bg:#10111f;--bg2:#15172a;--card:#1e2138;--card2:#262a45;--ink:#f6f3e8;--muted:#aaa6c7;--line:rgba(255,255,255,.10);--brand:#8b7cf6;--brand2:#5d4de6;--green:#35c981;--blue:#4aa3ff;--orange:#ffb84d;--red:#ff6678;--shadow:0 18px 48px rgba(0,0,0,.28)}*{box-sizing:border-box}html,body,#app{height:100%;margin:0}body{background:radial-gradient(circle at top left,rgba(139,124,246,.25),transparent 35%),radial-gradient(circle at bottom right,rgba(53,201,129,.12),transparent 28%),var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}button,input,textarea,select{font:inherit}button{border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}button:active{transform:scale(.97)}.app{height:100%;display:flex;flex-direction:column}.top{height:62px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);background:rgba(16,17,31,.72);backdrop-filter:blur(18px);z-index:5}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:40px;height:40px;border-radius:16px;background:linear-gradient(145deg,var(--brand),var(--green));display:grid;place-items:center;font-weight:900;box-shadow:0 10px 28px rgba(139,124,246,.35)}.brandText{min-width:0;line-height:1.1}.brandText b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:16px}.brandText span{display:block;color:var(--muted);font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}.iconBtn{width:42px;height:42px;border-radius:16px;background:rgba(255,255,255,.06);color:var(--ink);border:1px solid var(--line);display:grid;place-items:center;font-weight:900}.main{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 94px}.hero{background:linear-gradient(145deg,rgba(139,124,246,.22),rgba(53,201,129,.08)),var(--card);border:1px solid var(--line);border-radius:30px;padding:22px;box-shadow:var(--shadow)}.hero h1{margin:0;font-size:28px;line-height:1.05;letter-spacing:-.6px}.hero p{color:var(--muted);margin:10px 0 18px;line-height:1.45}.ctaRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border-radius:18px;padding:13px 14px;background:var(--brand);color:white;font-weight:850;display:flex;align-items:center;justify-content:center;gap:8px}.btn.secondary{background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--ink)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.stat{background:rgba(255,255,255,.055);border:1px solid var(--line);border-radius:20px;padding:12px 8px;text-align:center}.stat b{display:block;font-size:18px}.stat span{display:block;color:var(--muted);font-size:11px;margin-top:3px}.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:16px 0 12px}.tabs button{padding:10px 4px;border-radius:15px;background:rgba(255,255,255,.055);color:var(--muted);border:1px solid var(--line);font-size:12px;font-weight:800}.tabs button.active{background:var(--brand);color:white}.searchBox{display:flex;gap:8px;margin-bottom:12px}.searchBox input{flex:1;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--ink);border-radius:17px;padding:12px 14px;outline:none}.list{display:grid;gap:10px}.wordCard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.14)}.wordTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.wordTop b{font-size:20px;line-height:1.15}.wordTop small{color:var(--muted);font-size:12px}.wordPt{color:var(--green);margin:7px 0 0;font-weight:700}.example{color:var(--muted);margin:8px 0 0;line-height:1.45;font-size:14px}.note{margin-top:8px;padding:9px 10px;border-radius:14px;background:rgba(255,255,255,.05);color:#d9d5f4;line-height:1.35;font-size:13px}.wordActions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}.smallBtn{border-radius:14px;padding:9px 10px;background:rgba(255,255,255,.07);color:var(--ink);border:1px solid var(--line);font-size:13px;font-weight:800}.smallBtn.danger{color:#ffd4da}.empty{border:1px dashed var(--line);color:var(--muted);text-align:center;padding:24px;border-radius:24px;line-height:1.45;background:rgba(255,255,255,.04)}.bottomNav{position:fixed;left:10px;right:10px;bottom:10px;background:rgba(30,33,56,.88);border:1px solid var(--line);border-radius:26px;padding:8px;box-shadow:var(--shadow);backdrop-filter:blur(18px);display:grid;grid-template-columns:repeat(4,1fr);gap:7px;z-index:10}.bottomNav button{padding:11px 4px;border-radius:18px;background:transparent;color:var(--muted);font-weight:850;font-size:12px}.bottomNav button.active{background:var(--brand);color:white}.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:20;display:none;align-items:flex-end}.modalBg.on{display:flex}.sheet{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:30px 30px 0 0;padding:18px;max-height:92vh;overflow:auto;box-shadow:0 -18px 48px rgba(0,0,0,.35)}.sheetHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.sheetHead h2{margin:0;font-size:21px}.form{display:grid;gap:10px}.field label{display:block;color:var(--muted);font-size:13px;margin:0 0 6px 3px}.field input,.field textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--ink);border-radius:17px;padding:13px 14px;outline:none}.field textarea{min-height:78px;resize:vertical}.reviewWrap{min-height:calc(100vh - 180px);display:flex;flex-direction:column;justify-content:center}.reviewCard{background:linear-gradient(145deg,rgba(139,124,246,.18),rgba(255,255,255,.04)),var(--card);border:1px solid var(--line);border-radius:34px;padding:24px;box-shadow:var(--shadow);text-align:center}.reviewMode{color:var(--muted);font-size:13px;font-weight:800;margin-bottom:12px}.reviewWord{font-size:34px;line-height:1.05;font-weight:900;margin:0;word-break:break-word}.reviewSub{margin:12px 0 0;color:var(--muted);line-height:1.45}.answer{display:none;margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}.answer.on{display:block}.answer b{color:var(--green);font-size:22px}.answer p{color:var(--muted);line-height:1.45}.gradeGrid{display:none;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}.gradeGrid.on{display:grid}.gradeGrid button{border-radius:16px;padding:12px 4px;color:white;font-size:12px;font-weight:900}.g0{background:var(--red)}.g1{background:var(--orange)}.g2{background:var(--blue)}.g3{background:var(--green)}.bigActions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.writeInput{width:100%;margin-top:14px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--ink);border-radius:17px;padding:13px 14px;outline:none}.compareBox{display:none;text-align:left;margin-top:14px;padding:12px;border-radius:17px;background:rgba(255,255,255,.055);border:1px solid var(--line);color:var(--muted);line-height:1.45}.compareBox.on{display:block}.toolsGrid{display:grid;gap:12px}.toolCard{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px}.toolCard h3{margin:0 0 6px}.toolCard p{margin:0 0 12px;color:var(--muted);line-height:1.4}#fileImport{display:none}.toast{position:fixed;left:14px;right:14px;bottom:94px;z-index:50;background:var(--ink);color:#10111f;padding:13px;border-radius:17px;text-align:center;font-weight:850;transform:translateY(120px);opacity:0;transition:.22s}.toast.on{transform:translateY(0);opacity:1}.hidden{display:none!important}@media(max-width:380px){.tabs{grid-template-columns:repeat(3,1fr)}.stats{grid-template-columns:repeat(2,1fr)}.reviewWord{font-size:29px}.gradeGrid button{font-size:11px}}

/* V2 refinements */
.main{
  padding-bottom:142px!important;
}
.wordTop{
  align-items:center!important;
}
.wordTitleWrap{
  min-width:0;
  flex:1;
}
.wordTitleWrap b{
  display:block!important;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  margin-bottom:5px;
}
.wordStatus{
  display:inline-flex!important;
  align-items:center;
  gap:4px;
  padding:5px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  color:var(--muted)!important;
  font-size:11px!important;
  font-weight:800;
}
.speakBtn{
  width:44px!important;
  height:44px!important;
  border-radius:17px!important;
  font-size:18px;
  flex:0 0 auto;
}
.wordCard{
  overflow:hidden;
}
.wordPt{
  font-size:17px;
}
.example{
  font-size:15px;
}
.reviewWrap{
  min-height:calc(100vh - 250px)!important;
  justify-content:flex-start!important;
  padding-top:70px;
}
.reviewCard{
  border-radius:32px!important;
}
.reviewWord{
  font-size:32px!important;
}
.bottomNav{
  bottom:14px!important;
}
.toast{
  bottom:106px!important;
}
@media(max-width:380px){
  .wordTitleWrap b{
    font-size:19px;
  }
  .wordStatus{
    font-size:10px!important;
  }
  .reviewWrap{
    padding-top:54px;
  }
}

<body>
<div class="app"><header class="top"><div class="brand"><div class="logo">V</div><div class="brandText"><b>Vocabulário Vivo</b><span id="topSub">Aprenda com repetição inteligente</span></div></div><button class="iconBtn" id="quickAdd">＋</button></header><main class="main" id="main"></main><nav class="bottomNav"><button id="navHome" class="active">Início</button><button id="navReview">Revisar</button><button id="navWords">Palavras</button><button id="navTools">Backup</button></nav></div>
<div class="modalBg" id="modalBg"><section class="sheet"><div class="sheetHead"><h2 id="modalTitle">Nova palavra</h2><button class="iconBtn" id="closeModal">×</button></div><div class="form"><div class="field"><label>Palavra ou frase em inglês</label><input id="enInput" placeholder="Ex: I am looking forward to it"></div><div class="field"><label>Tradução em português</label><input id="ptInput" placeholder="Ex: Estou ansioso por isso"></div><div class="field"><label>Frase de exemplo</label><textarea id="exInput" placeholder="Ex: I am looking forward to watching this movie."></textarea></div><div class="field"><label>Observação sua</label><textarea id="noteInput" placeholder="Ex: looking forward to = estar ansioso por algo"></textarea></div><button class="btn" id="saveWord">Salvar</button></div></section></div>
<input type="file" id="fileImport" accept=".json,application/json"><div class="toast" id="toast"></div>
<script>
const STORE_KEY='vocabulario_vivo_v2_words';let state={screen:'home',tab:'all',query:'',editingId:null,reviewMode:'normal',currentReview:null,answerShown:false};function now(){return Date.now()}function day(ms=1){return ms*86400000}function min(m=1){return m*60000}function id(){return Date.now()+'-'+Math.random().toString(16).slice(2)}function loadWords(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]')}catch(e){return[]}}function saveWords(words){localStorage.setItem(STORE_KEY,JSON.stringify(words))}function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2300)}function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function normalize(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}function statusOf(w){if(!w.reps)return'new';if((w.nextReviewAt||0)<=now())return'due';if((w.reps||0)>=5&&(w.intervalDays||0)>=7)return'mastered';return'learning'}function statusLabel(w){const s=statusOf(w);return s==='new'?'Nova':s==='due'?'Revisar':s==='mastered'?'Dominada':'Aprendendo'}function dueWords(){return loadWords().filter(w=>statusOf(w)==='new'||statusOf(w)==='due')}function speak(text){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.88;speechSynthesis.speak(u)}catch(e){toast('Seu navegador não liberou a voz.')}}function seedExamples(){const words=loadWords();if(words.length)return;const samples=[['actually','na verdade / de fato','Actually, I need more time to study.','Cuidado: não é “atualmente”.'],['I agree with you','Eu concordo com você','I agree with you about this idea.','with = com'],['to improve','melhorar','I want to improve my English every day.','Muito útil para falar de estudos.'],['I am interested in','Eu tenho interesse em','I am interested in movies and technology.','Depois usa IN, não TO.'],['to get better','melhorar / ficar melhor','My listening is getting better.','Expressão natural.'],['even though','mesmo que / embora','Even though it is hard, I keep studying.','Conector importante.'],['mistake','erro','I made a mistake in this sentence.','make a mistake = cometer erro.'],['I used to','Eu costumava','I used to watch movies with subtitles.','Para hábitos do passado.']];saveWords(samples.map(([en,pt,example,note])=>({id:id(),en,pt,example,note,createdAt:now(),lastReviewedAt:null,nextReviewAt:now(),reps:0,lapses:0,ease:2.3,intervalDays:0})))}function render(){document.querySelectorAll('.bottomNav button').forEach(b=>b.classList.remove('active'));document.getElementById('navHome').classList.toggle('active',state.screen==='home');document.getElementById('navReview').classList.toggle('active',state.screen==='review');document.getElementById('navWords').classList.toggle('active',state.screen==='words');document.getElementById('navTools').classList.toggle('active',state.screen==='tools');if(state.screen==='home')renderHome();if(state.screen==='review')renderReview();if(state.screen==='words')renderWords();if(state.screen==='tools')renderTools()}function stats(){const words=loadWords();return{total:words.length,due:dueWords().length,new:words.filter(w=>statusOf(w)==='new').length,mastered:words.filter(w=>statusOf(w)==='mastered').length}}function renderHome(){const s=stats();document.getElementById('topSub').textContent='Seu treino diário de vocabulário';document.getElementById('main').innerHTML=`<section class="hero"><h1>Transforme palavras em memória.</h1><p>Salve palavras/frases do inglês e revise com repetição inteligente. Pouco todo dia, sem bagunça.</p><div class="ctaRow"><button class="btn" onclick="startReview('normal')">Revisar agora</button><button class="btn secondary" onclick="openAdd()">Adicionar</button></div></section><section class="stats"><div class="stat"><b>${s.total}</b><span>Total</span></div><div class="stat"><b>${s.due}</b><span>Para hoje</span></div><div class="stat"><b>${s.new}</b><span>Novas</span></div><div class="stat"><b>${s.mastered}</b><span>Dominadas</span></div></section><section class="hero"><h1 style="font-size:22px">Treinos rápidos</h1><p>Escolha um modo. O melhor para você agora é revisar e ouvir bastante.</p><div class="ctaRow"><button class="btn secondary" onclick="startReview('listening')">Listening</button><button class="btn secondary" onclick="startReview('writing')">Escrita</button></div></section>`}function filteredWords(){let words=loadWords();if(state.tab!=='all')words=words.filter(w=>statusOf(w)===state.tab);const q=normalize(state.query);if(q)words=words.filter(w=>normalize(w.en).includes(q)||normalize(w.pt).includes(q)||normalize(w.example).includes(q)||normalize(w.note).includes(q));return words.sort((a,b)=>(a.nextReviewAt||0)-(b.nextReviewAt||0))}function renderWords(){document.getElementById('topSub').textContent='Sua lista de palavras';const words=filteredWords();const tabs=[['all','Todas'],['new','Novas'],['due','Hoje'],['learning','Loop'],['mastered','Dominadas']];document.getElementById('main').innerHTML=`<div class="searchBox"><input id="searchInput" placeholder="Buscar palavra, tradução..." value="${escapeHtml(state.query)}"><button class="iconBtn" onclick="openAdd()">＋</button></div><div class="tabs">${tabs.map(([key,label])=>`<button class="${state.tab===key?'active':''}" onclick="setTab('${key}')">${label}</button>`).join('')}</div><div class="list">${words.length?words.map(wordHtml).join(''):`<div class="empty">Nenhuma palavra aqui ainda.</div>`}</div>`;document.getElementById('searchInput').addEventListener('input',e=>{state.query=e.target.value;renderWords()})}function wordHtml(w){return `<article class="wordCard"><div class="wordTop"><div><b>${escapeHtml(w.en)}</b><small>${statusLabel(w)} · revisões: ${w.reps||0}</small></div><button class="iconBtn" onclick="speak(\`${escapeHtml(w.en)}\`)">🔊</button></div><div class="wordPt">${escapeHtml(w.pt)}</div>${w.example?`<p class="example">${escapeHtml(w.example)}</p>`:''}${w.note?`<div class="note">${escapeHtml(w.note)}</div>`:''}<div class="wordActions"><button class="smallBtn" onclick="editWord('${w.id}')">Editar</button><button class="smallBtn" onclick="singleReview('${w.id}')">Revisar</button><button class="smallBtn danger" onclick="deleteWord('${w.id}')">Apagar</button></div></article>`}function pickReviewWord(){const due=dueWords();if(!due.length)return null;due.sort((a,b)=>(a.nextReviewAt||0)-(b.nextReviewAt||0));return due[0]}function startReview(mode){state.screen='review';state.reviewMode=mode;state.currentReview=pickReviewWord();state.answerShown=false;render()}function singleReview(wordId){const w=loadWords().find(x=>x.id===wordId);if(!w)return;state.screen='review';state.reviewMode='normal';state.currentReview=w;state.answerShown=false;render()}function renderReview(){document.getElementById('topSub').textContent='Revisão inteligente<div class='goalBox'>Meta diária: 10 revisões</div><button class='quickBtn' onclick='alert("Modo rápido em breve")'>⚡ Revisão rápida</button>';const w=state.currentReview;if(!w){document.getElementById('main').innerHTML=`<div class="reviewWrap"><div class="reviewCard"><div class="reviewMode">Tudo em dia</div><h2 class="reviewWord">Boa! 🎉</h2><p class="reviewSub">Não tem palavras vencidas agora. Adicione novas ou volte mais tarde.</p><div class="bigActions"><button class="btn" onclick="openAdd()">Adicionar</button><button class="btn secondary" onclick="go('words')">Ver lista</button></div></div></div>`;return}const modeLabel=state.reviewMode==='listening'?'LISTENING':state.reviewMode==='writing'?'ESCRITA':'REVISÃO';let front=escapeHtml(w.en),sub='Tente lembrar o significado antes de virar.',extra='';if(state.reviewMode==='listening'){front='🔊 Ouça e tente entender';sub='Toque em ouvir, tente entender e depois revele.';extra=`<button class="btn secondary" style="margin-top:14px" onclick="speakCurrent()">Ouvir</button>`}if(state.reviewMode==='writing'){front=escapeHtml(w.pt);sub='Escreva em inglês antes de revelar.';extra=`<input class="writeInput" id="writeAnswer" placeholder="Digite em inglês..."><div class="compareBox" id="compareBox"></div>`}document.getElementById('main').innerHTML=`<div class="reviewWrap"><div class="reviewCard"><div class="reviewMode">${modeLabel} · ${statusLabel(w)}</div><h2 class="reviewWord">${front}</h2><p class="reviewSub">${sub}</p>${extra}<div class="answer ${state.answerShown?'on':''}" id="answerBox"><b>${escapeHtml(w.pt)}</b><p><strong>Inglês:</strong> ${escapeHtml(w.en)}</p>${w.example?`<p><strong>Exemplo:</strong> ${escapeHtml(w.example)}</p>`:''}${w.note?`<p><strong>Nota:</strong> ${escapeHtml(w.note)}</p>`:''}</div><div class="bigActions ${state.answerShown?'hidden':''}" id="revealActions"><button class="btn" onclick="showAnswer()">Virar</button><button class="btn secondary" onclick="speakCurrent()">Ouvir</button></div><div class="gradeGrid ${state.answerShown?'on':''}" id="gradeGrid"><button class="g0" onclick="grade(0)">Errei</button><button class="g1" onclick="grade(1)">Difícil</button><button class="g2" onclick="grade(2)">Bom</button><button class="g3" onclick="grade(3)">Fácil</button></div></div></div>`}function showAnswer(){state.answerShown=true;renderReview();if(state.reviewMode==='writing'){const input=document.getElementById('writeAnswer'),box=document.getElementById('compareBox');const attempt=input?input.value.trim():'';if(box){box.classList.add('on');box.innerHTML=`<b>Sua resposta:</b> ${escapeHtml(attempt||'(vazio)')}<br><b><div id='feedback' class='feedback'></div>Resposta esperada:</b> ${escapeHtml(state.currentReview.en)}`}}}function speakCurrent(){if(state.currentReview)speak(state.currentReview.en)}function grade(level){if(!state.currentReview)return;const words=loadWords();const idx=words.findIndex(w=>w.id===state.currentReview.id);if(idx<0)return;const w=words[idx];w.reps=w.reps||0;w.lapses=w.lapses||0;w.ease=w.ease||2.3;w.intervalDays=w.intervalDays||0;w.lastReviewedAt=now();if(level===0){w.lapses+=1;w.ease=Math.max(1.3,w.ease-.25);w.nextReviewAt=now()+min(3);w.intervalDays=0}else if(level===1){w.ease=Math.max(1.4,w.ease-.12);w.nextReviewAt=now()+min(15);w.intervalDays=0}else if(level===2){w.reps+=1;if(w.reps<=1)w.intervalDays=1;else w.intervalDays=Math.max(1,Math.round(w.intervalDays*w.ease));w.nextReviewAt=now()+day(w.intervalDays)}else if(level===3){w.reps+=1;w.ease=Math.min(3,w.ease+.12);if(w.reps<=1)w.intervalDays=4;else w.intervalDays=Math.max(4,Math.round((w.intervalDays||1)*w.ease*1.25));w.nextReviewAt=now()+day(w.intervalDays)}words[idx]=w;saveWords(words);state.currentReview=pickReviewWord();state.answerShown=false;renderReview()}function openAdd(){state.editingId=null;document.getElementById('modalTitle').textContent='Nova palavra';document.getElementById('enInput').value='';document.getElementById('ptInput').value='';document.getElementById('exInput').value='';document.getElementById('noteInput').value='';document.getElementById('modalBg').classList.add('on')}function editWord(wordId){const w=loadWords().find(x=>x.id===wordId);if(!w)return;state.editingId=wordId;document.getElementById('modalTitle').textContent='Editar palavra';document.getElementById('enInput').value=w.en||'';document.getElementById('ptInput').value=w.pt||'';document.getElementById('exInput').value=w.example||'';document.getElementById('noteInput').value=w.note||'';document.getElementById('modalBg').classList.add('on')}function closeModal(){document.getElementById('modalBg').classList.remove('on')}function saveWord(){const en=document.getElementById('enInput').value.trim(),pt=document.getElementById('ptInput').value.trim(),example=document.getElementById('exInput').value.trim(),note=document.getElementById('noteInput').value.trim();if(!en||!pt){toast('Preencha inglês e tradução.');return}const words=loadWords();if(state.editingId){const idx=words.findIndex(w=>w.id===state.editingId);if(idx>=0)words[idx]={...words[idx],en,pt,example,note,updatedAt:now()}}else words.unshift({id:id(),en,pt,example,note,createdAt:now(),lastReviewedAt:null,nextReviewAt:now(),reps:0,lapses:0,ease:2.3,intervalDays:0});saveWords(words);closeModal();toast('Salvo.');render()}function deleteWord(wordId){if(!confirm('Apagar esta palavra?'))return;saveWords(loadWords().filter(w=>w.id!==wordId));toast('Apagada.');render()}function setTab(tab){state.tab=tab;renderWords()}function go(screen){state.screen=screen;render()}function renderTools(){document.getElementById('topSub').textContent='Backup e transferência';document.getElementById('main').innerHTML=`<section class="toolsGrid"><article class="toolCard"><h3>Backup completo</h3><p>Salva todas as palavras, progresso, revisões e notas em JSON.</p><button class="btn" onclick="exportJson()">Exportar JSON</button></article><article class="toolCard"><h3>Importar backup</h3><p>Restaure suas palavras em outro celular ou depois de reinstalar.</p><button class="btn secondary" onclick="document.getElementById('fileImport').click()">Importar JSON</button></article><article class="toolCard"><h3>Exportar para estudar</h3><p>Gera um TXT simples com palavras, traduções e exemplos.</p><button class="btn secondary" onclick="exportTxt()">Exportar TXT</button></article><article class="toolCard"><h3>Resetar app</h3><p>Apaga todas as palavras salvas neste navegador.</p><button class="btn secondary" onclick="resetApp()">Apagar tudo</button></article></section>`}function exportJson(){const data={app:'Vocabulário Vivo',version:1,exportedAt:new Date().toISOString(),words:loadWords()};download('vocabulario_vivo_backup.json',JSON.stringify(data,null,2),'application/json')}function exportTxt(){const words=loadWords();const lines=['VOCABULÁRIO VIVO','Exportado em: '+new Date().toLocaleString('pt-BR'),''];for(const w of words){lines.push(`${w.en} = ${w.pt}`);if(w.example)lines.push(`Exemplo: ${w.example}`);if(w.note)lines.push(`Nota: ${w.note}`);lines.push(`Status: ${statusLabel(w)} | Revisões: ${w.reps||0}`);lines.push('---')}download('vocabulario_vivo.txt',lines.join('\n'),'text/plain;charset=utf-8')}function download(name,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),800)}document.getElementById('fileImport').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;try{const text=await file.text();const data=JSON.parse(text);const words=Array.isArray(data)?data:data.words;if(!Array.isArray(words))throw new Error('Backup inválido');if(!confirm('Importar backup? Isso vai juntar com suas palavras atuais.'))return;const current=loadWords();const existing=new Set(current.map(w=>w.id));const merged=[...current];for(const w of words){if(!w.en||!w.pt)continue;if(existing.has(w.id))merged.push({...w,id:id()});else merged.push({...w,id:w.id||id()})}saveWords(merged);toast('Backup importado.');render()}catch(err){toast('Não consegui importar esse arquivo.')}finally{e.target.value=''}});function resetApp(){if(!confirm('Tem certeza? Isso apaga todas as palavras.'))return;if(!confirm('Última confirmação: apagar tudo mesmo?'))return;localStorage.removeItem(STORE_KEY);seedExamples();toast('App resetado com exemplos.');render()}document.getElementById('quickAdd').onclick=openAdd;document.getElementById('closeModal').onclick=closeModal;document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});document.getElementById('saveWord').onclick=saveWord;document.getElementById('navHome').onclick=()=>go('home');document.getElementById('navReview').onclick=()=>startReview('normal');document.getElementById('navWords').onclick=()=>go('words');document.getElementById('navTools').onclick=()=>go('tools');seedExamples();render();if('serviceWorker'in navigator&&location.protocol.startsWith('http'))window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{})});

// === V3 INTELIGENTE ===
function normalizar(txt){
  return (txt||"")
    .toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[.,!?]/g,"")
    .replace(/\s+/g," ")
    .trim();
}

function compararResposta(user, correto){
  const u = normalizar(user);
  const c = normalizar(correto);

  if(!u) return {ok:false, nivel:"vazio"};

  if(u === c) return {ok:true, nivel:"perfeito"};

  // flexível: aceita se conter a essência
  if(c.includes(u) || u.includes(c)){
    return {ok:true, nivel:"quase"};
  }

  return {ok:false, nivel:"erro"};
}


function mostrarFeedback(res){
  const el = document.getElementById("feedback");
  if(!el) return;
  if(res.nivel==="perfeito"){
    el.innerText = "✅ Perfeito!";
    el.className="feedback ok";
  }else if(res.nivel==="quase"){
    el.innerText = "🟡 Quase lá!";
    el.className="feedback warn";
  }else if(res.nivel==="erro"){
    el.innerText = "❌ Diferente";
    el.className="feedback err";
  }else{
    el.innerText = "";
  }
}


// === V5 SISTEMA BASE ===
let progresso = {};

function registrarResultado(palavra, resultado){
  if(!progresso[palavra]) progresso[palavra] = {nivel:0};
  
  if(resultado==="acerto") progresso[palavra].nivel++;
  if(resultado==="erro") progresso[palavra].nivel = Math.max(0, progresso[palavra].nivel-1);

  localStorage.setItem("progresso", JSON.stringify(progresso));
}

function carregarProgresso(){
  progresso = JSON.parse(localStorage.getItem("progresso")||"{}");
}

carregarProgresso();
